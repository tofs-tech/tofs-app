<!DOCTYPE html>
<html lang="ko">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#232B3C">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<title>TOFS</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TOFS">
<style>
  :root{
    --bg:#EAEEF5; --surface:#FFFFFF; --surface-2:#F4F7FB; --surface-3:#E9EEF5;
    --ink:#131820; --muted:#4B5464; --faint:#79828F;
    --line:#DFE4EC; --line-strong:#C7CEDA;
    --primary:#232B3C; --primary-ink:#161C28;
    --accent:#3B51DC; --accent-ink:#2E41C0; --accent-soft:rgba(59,81,220,.10);
    --purple:#7A5AF0; --purple-soft:rgba(122,90,240,.12);
    --green:#12A45A; --green-ink:#0E8B4C; --green-soft:rgba(18,164,90,.12);
    --good:#12A45A; --good-soft:rgba(18,164,90,.12);
    --warn:#C6871B; --warn-soft:rgba(198,135,27,.14);
    --bad:#D24B3E;  --bad-soft:rgba(210,75,62,.12);
    --neutral:#7B8395; --neutral-soft:rgba(123,131,149,.13);
    --sun:#D24B3E; --sat:#3E6FD2;
    --shadow:0 1px 2px rgba(20,25,40,.04), 0 4px 16px rgba(20,25,40,.05);
    --sans:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",system-ui,-apple-system,sans-serif;
    --mono:"SF Mono","Cascadia Mono","Consolas","D2Coding","Menlo",monospace;
    --r:14px; --r-sm:9px;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#14171E; --surface:#1C2029; --surface-2:#232833; --surface-3:#2A303C;
    --ink:#E9ECF2; --muted:#9BA3B4; --faint:#6C7385;
    --line:#2A2F3A; --line-strong:#363D4A;
    --primary:#E9ECF2; --primary-ink:#FFFFFF;
    --accent:#8397FF; --accent-ink:#9DACFF; --accent-soft:rgba(131,151,255,.14);
    --purple:#A28CFF; --purple-soft:rgba(162,140,255,.16);
    --green:#3FC57E; --green-ink:#57D08F; --green-soft:rgba(63,197,126,.16);
    --good:#3FC57E; --good-soft:rgba(63,197,126,.16);
    --warn:#E0B056; --warn-soft:rgba(224,176,86,.16);
    --bad:#E97365; --bad-soft:rgba(233,115,101,.15);
    --neutral:#8B94A6; --neutral-soft:rgba(139,148,166,.16);
    --sun:#E97365; --sat:#7FA0F0;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.3);
  }}
  :root[data-theme="light"]{
    --bg:#EAEEF5; --surface:#FFFFFF; --surface-2:#F4F7FB; --surface-3:#E9EEF5;
    --ink:#131820; --muted:#4B5464; --faint:#79828F; --line:#DFE4EC; --line-strong:#C7CEDA;
    --primary:#232B3C; --primary-ink:#161C28; --accent:#3B51DC; --accent-ink:#2E41C0; --accent-soft:rgba(59,81,220,.10);
    --purple:#7A5AF0; --purple-soft:rgba(122,90,240,.12); --green:#12A45A; --green-ink:#0E8B4C; --green-soft:rgba(18,164,90,.12);
    --good:#12A45A; --good-soft:rgba(18,164,90,.12); --warn:#C6871B; --warn-soft:rgba(198,135,27,.14);
    --bad:#D24B3E; --bad-soft:rgba(210,75,62,.12); --neutral:#7B8395; --neutral-soft:rgba(123,131,149,.13);
    --sun:#D24B3E; --sat:#3E6FD2; --shadow:0 1px 2px rgba(20,25,40,.04), 0 4px 16px rgba(20,25,40,.05);
  }
  :root[data-theme="dark"]{
    --bg:#14171E; --surface:#1C2029; --surface-2:#232833; --surface-3:#2A303C;
    --ink:#E9ECF2; --muted:#9BA3B4; --faint:#6C7385; --line:#2A2F3A; --line-strong:#363D4A;
    --primary:#E9ECF2; --primary-ink:#FFFFFF; --accent:#8397FF; --accent-ink:#9DACFF; --accent-soft:rgba(131,151,255,.14);
    --purple:#A28CFF; --purple-soft:rgba(162,140,255,.16); --green:#3FC57E; --green-ink:#57D08F; --green-soft:rgba(63,197,126,.16);
    --good:#3FC57E; --good-soft:rgba(63,197,126,.16); --warn:#E0B056; --warn-soft:rgba(224,176,86,.16);
    --bad:#E97365; --bad-soft:rgba(233,115,101,.15); --neutral:#8B94A6; --neutral-soft:rgba(139,148,166,.16);
    --sun:#E97365; --sat:#7FA0F0; --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.3);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;}
  .num{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  button{font-family:inherit;}

  /* top bar */
  .appbar{position:sticky; top:0; z-index:40; display:flex; align-items:center; gap:12px;
    padding:11px 22px; background:color-mix(in srgb,var(--bg) 85%,transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--line);}
  .logo{display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:-.01em;}
  .logo .m{width:26px;height:26px;border-radius:7px;background:#4A7C50;color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800;}
  .logo .sub{font-size:10.5px;color:var(--faint);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
  .appbar .spacer{flex:1;}
  .psel{position:relative;}
  .psel select{appearance:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);background:var(--surface);
    border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:8px 30px 8px 13px;cursor:pointer;max-width:260px;}
  .psel::after{content:"";position:absolute;right:12px;top:50%;width:6px;height:6px;border-right:1.6px solid var(--muted);border-bottom:1.6px solid var(--muted);transform:translateY(-70%) rotate(45deg);pointer-events:none;}

  .wrap{max-width:1240px;margin:0 auto;padding:20px 22px 70px;}

  /* buttons */
  .btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--r-sm);
    border:1px solid var(--line-strong);background:var(--surface);color:var(--ink);cursor:pointer;transition:.12s;white-space:nowrap;}
  .btn:hover{border-color:var(--muted);}
  .btn svg{width:15px;height:15px;stroke-width:1.9;}
  .btn.dark{background:var(--primary);border-color:var(--primary);color:#fff;}
  :root[data-theme="dark"] .btn.dark{color:#14171E;} :root[data-theme="light"] .btn.dark{color:#fff;}
  .btn.dark:hover{background:var(--primary-ink);}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff;} .btn.green:hover{background:var(--green-ink);}
  .btn.accent{background:var(--accent);border-color:var(--accent);color:#fff;} .btn.accent:hover{background:var(--accent-ink);}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted);padding:7px 9px;} .btn.ghost:hover{background:var(--accent-soft);color:var(--ink);}
  .btn.sm{padding:5px 10px;font-size:12px;}
  .icon-btn{display:grid;place-items:center;width:34px;height:34px;border-radius:var(--r-sm);border:1px solid var(--line-strong);background:var(--surface);color:var(--muted);cursor:pointer;}
  .icon-btn:hover{color:var(--ink);border-color:var(--muted);} .icon-btn svg{width:17px;height:17px;stroke-width:1.7;}

  /* header card */
  .phead{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px 22px;}
  .phead h1{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0 0 14px;}
  .amount{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer;transition:.12s;}
  .amount:hover{border-color:var(--accent);}
  .amount .l{font-size:11.5px;color:var(--muted);} .amount .v{font-size:19px;font-weight:700;letter-spacing:-.01em;}
  .amount .v small{font-size:12px;font-weight:500;color:var(--muted);margin-left:4px;}
  .amount .chev{margin-left:auto;color:var(--faint);}
  .pinfo{display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
  .pinfo .row{display:grid;grid-template-columns:88px 1fr;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);align-items:center;}
  .pinfo .row:nth-last-child(-n+1){border-bottom:none;}
  .pinfo .k{font-size:12.5px;color:var(--muted);} .pinfo .v{font-size:13.5px;font-weight:500;}
  .pinfo .v.empty{color:var(--faint);font-weight:400;}
  .memoinput{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:7px 10px;}
  .phead-actions{display:flex;gap:10px;margin-top:16px;}
  .phead-actions .btn{flex:1;justify-content:center;}
  .link{color:var(--accent);cursor:pointer;font-weight:600;} .link:hover{text-decoration:underline;}

  /* tabs */
  .tabs{display:flex;gap:2px;margin:18px 0 20px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tabs button{position:relative;background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:12px 15px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  .tabs button:hover{color:var(--ink);}
  .tabs button.active{color:var(--accent);}
  .tabs button.active::after{content:"";position:absolute;left:8px;right:8px;bottom:-1px;height:2.5px;background:var(--accent);border-radius:2px;}
  .badge{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:100px;background:var(--purple-soft);color:var(--purple);letter-spacing:.02em;}
  .badge.gray{background:var(--neutral-soft);color:var(--neutral);}

  /* cards / views */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;}
  .card+.card{margin-top:16px;}
  .card-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .card-h .ct{font-size:14px;font-weight:650;} .card-h .cs{font-size:12px;color:var(--faint);}
  .pad{padding:18px;}
  .vhead{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
  .vhead .t{font-size:15px;font-weight:650;} .vhead .d{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .vhead .spacer{flex:1;}
  .tip{background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);border-radius:var(--r-sm);padding:11px 14px;font-size:12.5px;color:var(--ink);margin-bottom:16px;line-height:1.6;}
  .tip b{color:var(--accent-ink);}

  /* KPI */
  .kpis{display:grid;gap:12px;margin-bottom:16px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--shadow);}
  .kpi.tint{background:var(--purple-soft);border-color:transparent;}
  .kpi .k{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .kpi.tint .k{color:var(--purple);}
  .kpi .v{font-size:22px;font-weight:700;margin-top:6px;letter-spacing:-.02em;}
  .kpi .v small{font-size:12px;font-weight:500;color:var(--muted);margin-left:2px;}
  .kpi .s{font-size:11.5px;color:var(--faint);margin-top:4px;}
  .kpi .bar{height:5px;border-radius:3px;background:var(--line);margin-top:10px;overflow:hidden;}
  .kpi .bar i{display:block;height:100%;border-radius:3px;background:var(--accent);}

  /* tables */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-weight:600;font-size:11.5px;color:var(--muted);padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface-2);}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:var(--surface-2);}
  td.r,th.r{text-align:right;} td.c,th.c{text-align:center;}
  .row-actions{display:flex;gap:2px;justify-content:flex-end;opacity:.3;transition:.12s;}
  tr:hover .row-actions{opacity:1;} .row-actions .icon-btn{width:28px;height:28px;}
  .strong{font-weight:600;} .sub{color:var(--muted);font-size:12px;}
  .empty{padding:44px 20px;text-align:center;color:var(--faint);}
  .empty svg{width:32px;height:32px;opacity:.5;margin-bottom:10px;stroke-width:1.4;}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap;}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
  .pill.neutral{color:var(--neutral);background:var(--neutral-soft);}
  .pill.accent{color:var(--accent-ink);background:var(--accent-soft);}
  .pill.good{color:var(--good);background:var(--good-soft);}
  .pill.warn{color:var(--warn);background:var(--warn-soft);}
  .pill.bad{color:var(--bad);background:var(--bad-soft);}
  .pill.purple{color:var(--purple);background:var(--purple-soft);}
  .tag{display:inline-block;font-size:11px;color:var(--muted);background:var(--surface-3);border:1px solid var(--line);border-radius:5px;padding:2px 7px;white-space:nowrap;}

  /* calendar */
  .calbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
  .calbar .mo{font-size:17px;font-weight:700;letter-spacing:-.01em;min-width:130px;text-align:center;}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);border-left:1px solid var(--line);border-top:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface);}
  .cal .dow{padding:9px 0;text-align:center;font-size:12px;font-weight:600;color:var(--muted);border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--surface-2);}
  .cal .dow.s0{color:var(--sun);} .cal .dow.s6{color:var(--sat);}
  .cell{min-height:104px;padding:6px 6px 8px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);position:relative;}
  .cell.out{background:var(--surface-2);} .cell.today{box-shadow:inset 0 0 0 2px var(--accent);}
  .cell .dn{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--ink);}
  .cell.out .dn{color:var(--faint);} .cell .dn.s0{color:var(--sun);} .cell .dn.s6{color:var(--sat);}
  .cell .hol{font-size:9.5px;color:var(--sun);font-weight:600;margin-left:4px;}
  .cell .chips{display:flex;flex-direction:column;gap:3px;margin-top:5px;}
  .chip{display:flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:3px 6px;border-radius:5px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
  .chip .ck{width:12px;height:12px;flex:none;}
  .chip.done{opacity:.72;}
  /* 홈 대시보드 */
  .hcard{cursor:pointer;transition:.12s;margin-top:14px;}
  .hcard:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(20,25,40,.09);}
  .hstrip{position:relative;height:16px;border-radius:8px;background:var(--surface-3);margin-top:10px;overflow:hidden;}
  .hstrip i{position:absolute;top:2px;bottom:2px;border-radius:4px;}
  .hstrip b{position:absolute;top:-1px;bottom:-1px;width:2px;background:var(--bad);box-shadow:0 0 0 1px rgba(255,255,255,.6);}
  .hstrip-lb{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);margin-top:3px;font-family:var(--mono);}
  .cell .mlab{font-size:9px;color:var(--accent);font-weight:800;margin-left:3px;letter-spacing:-.02em;}
  .cell.alt{background:color-mix(in srgb,var(--accent-soft) 55%,transparent);}
  .cell.alt.out{background:var(--surface-2);}

  /* gantt timeline (공정표) */
  .gwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--surface);box-shadow:var(--shadow);}
  .gwrap .gantt{--cw:36px;min-width:max-content;}
  .grow{display:flex;align-items:stretch;border-bottom:1px solid var(--line);}
  .grow:last-child{border-bottom:none;}
  .glabel{width:148px;flex:none;position:sticky;left:0;z-index:3;background:var(--surface);border-right:1px solid var(--line-strong);
    display:flex;align-items:center;gap:8px;padding:0 14px;font-size:12.5px;font-weight:650;min-height:44px;}
  .gdot{width:9px;height:9px;border-radius:3px;flex:none;}
  .gpn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gtrack{position:relative;width:calc(var(--cw) * var(--n));flex:none;min-height:44px;}
  .gcells{display:grid;}
  .gcells.gbg{position:absolute;inset:0;}
  .gbg .gcell{border-right:1px solid var(--line);}
  .gcell.we{background:var(--surface-2);}
  .gcell.gtd{background:var(--accent-soft);box-shadow:inset 1.5px 0 0 var(--accent);}
  .ghrow{border-bottom:2px solid var(--line-strong);}
  .ghcorner{background:var(--surface-2);z-index:5;color:var(--muted);font-size:11.5px;font-weight:600;}
  .ghtrack{display:flex;flex-direction:column;}
  .gmonrow{display:flex;height:23px;border-bottom:1px solid var(--line);background:var(--surface-2);}
  .gmo{flex:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--muted);border-right:1px solid var(--line-strong);}
  .gdrow{height:42px;background:var(--surface);}
  .gdcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-right:1px solid var(--line);}
  .gdn{font-size:11px;font-weight:600;font-family:var(--mono);} .gdn.s0{color:var(--sun);} .gdn.s6{color:var(--sat);}
  .gdw{font-size:9px;color:var(--faint);}
  .gbar{position:absolute;top:50%;transform:translateY(-50%);height:26px;display:flex;align-items:center;gap:4px;padding:0 9px;
    border:1.5px solid;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;overflow:hidden;white-space:nowrap;z-index:1;transition:box-shadow .1s;}
  .gbar:hover{box-shadow:0 3px 12px rgba(20,25,40,.18);z-index:2;}
  .gbar .gbl{overflow:hidden;text-overflow:ellipsis;}
  .gbar .gck{display:inline-flex;flex:none;} .gbar .gck svg{width:12px;height:12px;stroke-width:3;}
  .gbar.st-neutral{border-style:dashed;}
  .gbar.done{opacity:.72;}
  .gbar.st-bad{border-color:var(--bad)!important;color:var(--bad)!important;background:var(--bad-soft)!important;}
  .glegend{display:flex;gap:16px;flex-wrap:wrap;margin:12px 2px 0;font-size:11.5px;color:var(--muted);}
  .glegend .lg{display:inline-flex;align-items:center;gap:6px;}
  .gsw{width:16px;height:12px;border-radius:4px;border:1.5px solid var(--muted);background:color-mix(in srgb,var(--muted) 16%,transparent);flex:none;}
  .gsw.dash{border-style:dashed;background:transparent;}
  .gsw.fill{background:color-mix(in srgb,var(--accent) 24%,transparent);border-color:var(--accent);}
  .gsw.done{opacity:.55;}
  .gsw.wknd{background:var(--surface-2);border-color:var(--line-strong);}
  .gsw.tdy{background:var(--accent-soft);border-color:var(--accent);}
  @media (max-width:820px){ .gantt{--cw:30px;} .glabel{width:104px;padding:0 10px;font-size:12px;} }

  /* todos */
  .todos{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px;}
  .todo-list{display:flex;flex-direction:column;gap:8px;padding:8px 0;}
  .todo{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
  .todo .cb{width:18px;height:18px;border:2px solid var(--line-strong);border-radius:50%;flex:none;cursor:pointer;margin-top:1px;display:grid;place-items:center;}
  .todo.done .cb{background:var(--green);border-color:var(--green);} .todo.done .cb svg{width:11px;height:11px;color:#fff;stroke-width:3;}
  .todo.done .tx{text-decoration:line-through;color:var(--faint);}
  .todo .tx{font-size:13px;font-weight:500;} .todo .meta{font-size:10.5px;color:var(--faint);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;}
  .addbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

  /* photos */
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .photo{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--surface-2);position:relative;}

  .photo:hover .del{opacity:1;} .photo .del svg{width:13px;height:13px;stroke-width:2;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}

  .subtabs{display:flex;gap:4px;margin-bottom:16px;}
  .subtabs button{font-size:13px;font-weight:600;padding:7px 14px;border-radius:var(--r-sm);border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;}
  .subtabs button.on{background:var(--primary);color:#fff;} :root[data-theme="dark"] .subtabs button.on{color:#14171E;}

  /* segmented toggle */
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:var(--r-sm);overflow:hidden;}
  .seg button{font-size:12.5px;font-weight:600;padding:7px 14px;border:none;background:var(--surface);color:var(--muted);cursor:pointer;}

  .seg button.on{background:var(--primary);color:#fff;} :root[data-theme="dark"] .seg button.on{color:#14171E;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(15,18,28,.45);backdrop-filter:blur(2px);display:grid;place-items:center;padding:24px;z-index:100;}
  .modal{background:var(--surface);border:1px solid var(--line-strong);border-radius:16px;width:min(580px,100%);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 70px rgba(0,0,0,.35);}

  .modal .msub{padding:0 22px 4px;font-size:12.5px;color:var(--muted);}
  .form{padding:16px 22px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;} .field.full{grid-column:1/-1;}
  .field label{font-size:12px;font-weight:600;color:var(--muted);} .field label .req{color:var(--bad);}
  .field input,.field select,.field textarea{font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:9px 11px;width:100%;}

  .field textarea{resize:vertical;min-height:64px;} .field .hint{font-size:11px;color:var(--faint);} .field.money input{font-family:var(--mono);}
  .modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center;}
  .modal-foot .right{display:flex;gap:8px;margin-left:auto;}

  /* login & cloud sync */
  .login-ov{position:fixed;inset:0;z-index:300;display:grid;place-items:center;background:var(--bg);padding:24px;}
  .login-card{width:min(360px,100%);background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:30px 26px;}
  .login-card .lg{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .login-card .lg .m{width:34px;height:34px;border-radius:9px;background:var(--accent);color:#fff;display:grid;place-items:center;font-weight:800;font-size:13px;}
  .login-card h1{font-size:18px;margin:0;letter-spacing:-.01em;}
  .login-card .ls{font-size:12.5px;color:var(--muted);margin:2px 0 16px;line-height:1.6;}
  .login-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 5px;}
  .login-card input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line-strong);border-radius:9px;padding:11px 12px;}
  .login-card input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent);}
  .login-card .err{color:var(--bad);font-size:12.5px;min-height:18px;margin-top:10px;}
  .login-card .btn{width:100%;justify-content:center;margin-top:6px;padding:11px;font-size:14px;}
  .sync{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:100px;background:var(--surface);border:1px solid var(--line);white-space:nowrap;}
  .sync::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--neutral);flex:none;}
  .sync.ok{color:var(--good);} .sync.ok::before{background:var(--good);}
  .sync.busy{color:var(--accent-ink);} .sync.busy::before{background:var(--accent);animation:syncpulse 1s infinite;}
  .sync.bad{color:var(--warn);} .sync.bad::before{background:var(--warn);}
  @keyframes syncpulse{50%{opacity:.35;}}
  /* 터치 기기(폰·패드): hover가 없으므로 수정/삭제 버튼 항상 표시 */

};

/* 문서용 로고: 업로드한 로고가 있으면 그걸 쓰고(크기 % 반영), 없으면 기본 벡터 로고 */

/* ===== storage (로컬 캐시 + Supabase 클라우드 동기화) ===== */
const KEY='tofs-hyunjang-v3';
const DEFAULT_TRADES=['목공','철거','설비','타일','페인트','도배','필름','가구','전기','창호','금속','청소','통신'];
let DB, state={tab:'home', calMonth:'2026-07', schedView:'timeline', siteSub:'sched', photoFilter:'전체', expScope:'one', estOpen:null, ctrOpen:null};
const load=()=>{try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}return null;};
const uid=()=>'id'+Math.random().toString(36).slice(2,9);

/* --- Supabase 연결 정보 --- */
const SB_URL='https://ygwadlnjzsldswrxiklw.supabase.co';
const SB_KEY='sb_publishable_mWyTLDE0tyH-g0wnxJeulw_Z-r8c1mA';
const SES_KEY=KEY+'-session';
let session=null, lastSyncedAt=null, syncT=null, syncBusy=false, syncDirty=false, refT=null;

/* save(): 로컬에 즉시 캐시 + 클라우드로 자동 업로드(1.2초 모아서) */
const save=()=>{try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} queueSync(); return true;};

function setSync(mode,txt){const el=document.getElementById('syncChip');if(!el)return;el.hidden=false;el.className='sync '+(mode||'');el.querySelector('.tx').textContent=txt;el.title=txt;}
function queueSync(){if(!session)return;syncDirty=true;setSync('busy','저장 중');clearTimeout(syncT);syncT=setTimeout(doSync,1200);}
async function doSync(){if(!session||syncBusy)return;syncBusy=true;syncDirty=false;
  try{await sbUpsert();lastSyncedAt=new Date().toISOString();setSync('ok','저장됨');}
  catch(e){syncDirty=true;setSync('bad','오프라인 · 재시도 중');clearTimeout(syncT);syncT=setTimeout(doSync,6000);}
  finally{syncBusy=false;if(syncDirty){clearTimeout(syncT);syncT=setTimeout(doSync,1500);}}}

async function sbAuth(path,body){const r=await fetch(SB_URL+'/auth/v1/'+path,{method:'POST',headers:{apikey:SB_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});const j=await r.json().catch(()=>({}));if(!r.ok)throw j;return j;}
function setSession(j){session={access_token:j.access_token,refresh_token:j.refresh_token,exp:Date.now()+(((j.expires_in||3600)-90)*1000),uid:(j.user&&j.user.id)||(session&&session.uid),email:(j.user&&j.user.email)||(session&&session.email)};
  try{localStorage.setItem(SES_KEY,JSON.stringify(session));}catch(e){}
  clearTimeout(refT);refT=setTimeout(refreshSession,Math.max(30000,session.exp-Date.now()));}
async function refreshSession(){if(!session)return;
  try{setSession(await sbAuth('token?grant_type=refresh_token',{refresh_token:session.refresh_token}));}
  catch(e){if(e&&(e.error==='invalid_grant'||e.error_code==='refresh_token_not_found'||e.error_code==='session_not_found')){doLogout(true);}
    else{clearTimeout(refT);refT=setTimeout(refreshSession,15000);}}}
async function fresh(){if(session&&Date.now()>session.exp)await refreshSession();if(!session)throw new Error('no session');}
const sbH=()=>({apikey:SB_KEY,Authorization:'Bearer '+session.access_token,'Content-Type':'application/json'});
async function sbLoad(){await fresh();const r=await fetch(SB_URL+'/rest/v1/app_state?select=data,updated_at&user_id=eq.'+session.uid,{headers:sbH()});if(!r.ok)throw new Error('load '+r.status);return(await r.json())[0]||null;}
async function sbUpsert(){await fresh();const r=await fetch(SB_URL+'/rest/v1/app_state?on_conflict=user_id',{method:'POST',headers:Object.assign(sbH(),{Prefer:'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({user_id:session.uid,data:DB,updated_at:new Date().toISOString()})});if(!r.ok)throw new Error('save '+r.status);}

function doLogout(force){
  if(!force&&!confirm('로그아웃할까요? 데이터는 클라우드에 안전하게 저장되어 있습니다.'))return;
  clearTimeout(refT);clearTimeout(syncT);session=null;
  try{localStorage.removeItem(SES_KEY);}catch(e){}
  location.reload();}

function showLogin(msg){
  let ov=document.getElementById('loginOv');
  if(!ov){ov=document.createElement('div');ov.id='loginOv';ov.className='login-ov';document.body.appendChild(ov);}
  ov.innerHTML=`<div class="login-card">
    <div class="lg"><span class="m">tof</span><h1>TOFS</h1></div>
    <div class="ls">클라우드 계정으로 로그인하면 휴대폰·패드·컴퓨터 어디서든 같은 데이터를 사용합니다.</div>
    <label>이메일</label><input id="liEmail" type="email" autocomplete="username" inputmode="email">
    <label>비밀번호</label><input id="liPw" type="password" autocomplete="current-password">
    <div class="err" id="liErr">${esc(msg||'')}</div>
    <button class="btn accent" id="liBtn">로그인</button>
  </div>`;
  const em=ov.querySelector('#liEmail'),pw=ov.querySelector('#liPw'),er=ov.querySelector('#liErr'),bt=ov.querySelector('#liBtn');
  try{em.value=localStorage.getItem(KEY+'-email')||'';}catch(e){}
  if(!IS_TOUCH)setTimeout(()=>{(em.value?pw:em).focus();},50);
  const go=async()=>{er.textContent='';bt.disabled=true;bt.textContent='확인 중…';
    try{const j=await sbAuth('token?grant_type=password',{email:em.value.trim(),password:pw.value});
      setSession(j);try{localStorage.setItem(KEY+'-email',em.value.trim());}catch(e){}
      ov.remove();await enterApp();}
    catch(e){bt.disabled=false;bt.textContent='로그인';
      const c=(e&&(e.error_code||e.error))||'';
      er.textContent = c==='invalid_credentials'?'이메일 또는 비밀번호가 올바르지 않습니다.'
        : c==='email_not_confirmed'?'이메일 인증이 완료되지 않은 계정입니다.'
        : (e&&(e.msg||e.error_description))||'로그인 실패 — 인터넷 연결을 확인해 주세요.';}};
  bt.onclick=go; pw.onkeydown=e=>{if(e.key==='Enter')go();}; em.onkeydown=e=>{if(e.key==='Enter')pw.focus();};
}

async function enterApp(){
  setSync('busy','불러오는 중');
  let row=null; try{row=await sbLoad();}catch(e){}
  if(row&&row.data&&row.data.projects&&row.data.projects.length){DB=row.data;lastSyncedAt=row.updated_at;setSync('ok','저장됨');}
  else{DB=load()||seed();queueSync();} /* 클라우드가 비어있으면 이 기기 데이터(또는 예시)를 올림 */
  DB.trades=DB.trades||DEFAULT_TRADES.slice();
  DB.company=Object.assign({},CO_DEFAULT,DB.company||{});
  DB.priceDB=DB.priceDB||[];
  DB.inbox=DB.inbox||[]; DB.inboxSeen=DB.inboxSeen||[]; /* 은행내역 미분류 인박스 */
  DB.coExpenses=DB.coExpenses||[]; /* 회사 공통 지출 (현장 비종속) */
  DB.vendors=DB.vendors||[]; /* 거래 업체 리스트 */
  DB.homeMemo=DB.homeMemo||''; /* 홈 자유 메모 */
  /* 기본 자재는 최초 1회 자동 내장 — 이후 사용자가 자유롭게 수정·삭제 */
  if(DB.priceSeedV!==2){loadPricePreset(true);DB.priceSeeded=true;DB.priceSeedV=2;save();}
  DB.projects.forEach(pr=>{pr.estimates=pr.estimates||[];pr.contracts=pr.contracts||[];});
  state.calMonth=(proj().info.start||todayStr()).slice(0,7);
  const lb=document.getElementById('logoutBtn');if(lb){lb.hidden=false;lb.onclick=()=>doLogout(false);}

/* 다른 기기에서 수정한 내용을 화면 복귀 시 자동 반영 */
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState!=='visible'||!session||!DB||syncBusy||syncDirty)return;

/* ===== helpers ===== */
/* iOS 홈화면(설치형) 앱에서 자동 포커스가 키보드를 막는 버그가 있어 터치 기기는 자동 포커스 안 함 */

const todayStr=()=>dkey(new Date());
const fdate=d=>{if(!d)return'—';const[y,m,day]=d.split('-');return`${m}.${day}`;};
const fdateF=d=>{if(!d)return'—';const[y,m,day]=d.split('-');return`${y}. ${m}. ${day}`;};

/* 사진을 긴 변 max(기본 1280px)로 자동 압축. png=true면 투명 유지(로고용) */
function compressImage(file,max,png){return new Promise(res=>{const img=new Image();
  img.onload=()=>{const MAX=max||1280;let w=img.naturalWidth,h=img.naturalHeight;
    if(w>MAX||h>MAX){const k=MAX/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    URL.revokeObjectURL(img.src);
    const usePng=png||(file&&file.type==='image/png');
    try{res(usePng?cv.toDataURL('image/png'):cv.toDataURL('image/jpeg',.72));}catch(e){res(null);}};
  img.onerror=()=>{URL.revokeObjectURL(img.src);res(null);};
  img.src=URL.createObjectURL(file);});}

  document.getElementById('phead').style.display=(state.tab==='home'||state.tab==='price'||state.tab==='vendors')?'none':'';

}
const isArchived=p=>p.info.status==='완료'||p.info.status==='취소';
function renderProjSelect(){const s=document.getElementById('projSelect');
  const opt=p=>`<option value="${p.id}" ${p.id===DB.active?'selected':''}>${esc(p.info.name)}</option>`;
  const act=DB.projects.filter(p=>!isArchived(p)), arch=DB.projects.filter(isArchived);
  s.innerHTML=
    (act.length?`<optgroup label="진행 중인 현장">${act.map(opt).join('')}</optgroup>`:'')+
    (arch.length?`<optgroup label="완료 · 보관 (${arch.length})">${arch.map(opt).join('')}</optgroup>`:'');
  s.onchange=()=>{DB.active=s.value;state.calMonth=(proj().info.start||'2026-07').slice(0,7);save();render();};}
function renderTabs(){const t=document.getElementById('tabs');
  t.innerHTML=TABS.map(x=>`<button data-tab="${x.id}" class="${state.tab===x.id?'active':''}">${x.label}${x.badge?`<span class="badge ${x.gray?'gray':''}">${x.badge}</span>`:''}</button>`).join('');

const hrow=(k,v)=>`<div class="row"><div class="k">${k}</div><div class="v ${v?'':'empty'}">${v||'—'}</div></div>`;
/* 공유: 폰에서는 공유창(카톡·문자·밴드 선택), PC에서는 클립보드 복사 */
const canShare=()=>!!navigator.share&&/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
function shareText(t,label){
  if(canShare()){
    navigator.share({text:t}).catch(e=>{if(!e||e.name!=='AbortError')copyText(t,label);});
  } else copyText(t,label);
}

/* 일정표·발주서 시트를 PNG 이미지로 변환해 공유(폰) 또는 저장(PC) */
let h2cP=null;
function loadH2C(){
  if(window.html2canvas)return Promise.resolve();
  if(h2cP)return h2cP;
  h2cP=new Promise((res,rej)=>{const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload=res; s.onerror=()=>{h2cP=null;rej(new Error('cdn'));};
    document.head.appendChild(s);});
  return h2cP;
}
async function sheetToBlob(html,land){
  await loadH2C();
  const host=document.createElement('div');
  host.style.cssText='position:fixed;left:-12000px;top:0;background:#fff;padding:24px;width:'+(land?'1500px':'860px');
  host.innerHTML=`<div class="psheet${land?' land':''}">${html}</div>`;
  document.body.appendChild(host);
  try{
    const cv=await html2canvas(host,{scale:2,backgroundColor:'#ffffff',logging:false});
    return await new Promise(r=>cv.toBlob(r,'image/png'));
  } finally { host.remove(); }
}
/* 준비된 이미지들을 페이지별 파일로 즉시 공유 — 실패 시 자동으로 저장으로 전환 */
async function shareBlobFiles(blobs,title){
  blobs=blobs.filter(Boolean); if(!blobs.length)return;
  const base=`${(proj().info.name||'현장')} ${title}`;
  const files=blobs.map((b,i)=>new File([b],base+(blobs.length>1?'-'+(i+1):'')+'.png',{type:'image/png'}));
  if(canShare()&&navigator.canShare&&navigator.canShare({files})){
    try{ await navigator.share({files,text:base}); return; }
    catch(e){ if(e&&e.name==='AbortError')return; /* 그 외 실패 → 저장으로 전환 */ }
  }
  for(let i=0;i<files.length;i++){
    const url=URL.createObjectURL(blobs[i]);
    const a=document.createElement('a');a.href=url;a.download=files[i].name;
    document.body.appendChild(a);a.click();a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),5000);
    if(i<files.length-1)await new Promise(r=>setTimeout(r,600));
  }
  toast(files.length>1?`${files.length}장 이미지로 저장했습니다 — 카톡에 첨부해 보내세요`:'이미지로 저장했습니다 — 카톡에 첨부해 보내세요');
}
function copyText(t,label){
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(t).then(()=>toast(label+' 복사됨')).catch(()=>fallbackCopy(t,label));
  } else fallbackCopy(t,label);
}
function fallbackCopy(t,label){
  try{
    const ta=document.createElement('textarea');ta.value=t;ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';document.body.appendChild(ta);
    ta.focus();ta.select();ta.setSelectionRange(0,t.length);
    const ok=document.execCommand('copy');document.body.removeChild(ta);
    if(ok)toast(label+' 복사됨'); else showCopyModal(t,label);
  }catch(e){showCopyModal(t,label);}
}
function showCopyModal(t,label){

function openPrint(html,land){

function showPreview(title,html,land){

  let sheetBlobs=null;

/* 간트 타임라인 — 공정(행) × 날짜(열), 기간 막대. 인테리어 공정표 형식 */
function ganttMarkup(p,lo,hi,today){
  const dows=['일','월','화','수','목','금','토'];
  const days=[]; let cur=new Date(lo); const endD=new Date(hi); let g=0;
  while(cur<=endD&&g++<400){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const n=days.length;
  // 공정을 이름별로 묶어 행 구성(시작일 순)
  const order=[], by={};
  p.schedule.slice().sort((a,b)=>(a.start||'').localeCompare(b.start||'')||(a.end||'').localeCompare(b.end||''))
    .forEach(s=>{const key=s.phase||'기타'; if(!by[key]){by[key]=[];order.push(key);} by[key].push(s);});
  // 월 헤더 구간
  const months=[]; days.forEach(d=>{const my=d.getFullYear()+'-'+d.getMonth(); const last=months[months.length-1];
    if(last&&last.my===my)last.span++; else months.push({my,span:1,label:(d.getMonth()+1)+'월'});});
  const monthRow=months.map(mo=>`<div class="gmo" style="width:calc(var(--cw) * ${mo.span})">${mo.label}</div>`).join('');
  const dcell=(d,head)=>{const dow=d.getDay(),k=dkey(d),we=dow===0||dow===6||!!HOLIDAYS[k],td=k===today;
    return head
      ? `<div class="gcell gdcell ${we?'we':''} ${td?'gtd':''}"><span class="gdn ${dow===0?'s0':''} ${dow===6?'s6':''}">${d.getDate()}</span><span class="gdw">${dows[dow]}</span></div>`
      : `<div class="gcell ${we?'we':''} ${td?'gtd':''}"></div>`;};
  const dayHead=days.map(d=>dcell(d,true)).join('');
  const bgCells=days.map(d=>dcell(d,false)).join('');
  const idxOf=ds=>daysBetween(lo,ds);
  const rows=order.map(phase=>{
    const col=tradeColor(phase);
    const bars=by[phase].map(s=>{
      const si=Math.max(0,idxOf(s.start)), ei=Math.min(n-1,idxOf(s.end)), span=Math.max(1,ei-si+1);
      const st=s.status||'예정', dn=st==='완료';
      const label=esc(s.note||`${fdate(s.start)}~${fdate(s.end)}`);
      return`<div class="gbar st-${SCH_ST[st]||'neutral'} ${dn?'done':''}" style="left:calc(var(--cw) * ${si});width:calc(var(--cw) * ${span});background:${mix(col,dn?.14:.2)};border-color:${col};color:${col}" data-e-type="schedule" data-e-id="${s.id}" title="${esc(phase)} · ${esc(st)} · ${esc(s.start)}~${esc(s.end)}${s.note?' · '+esc(s.note):''}">${dn?`<span class="gck">${svg(IC.check)}</span>`:''}<span class="gbl">${label}</span></div>`;
    }).join('');
    return`<div class="grow"><div class="glabel"><span class="gdot" style="background:${col}"></span><span class="gpn">${esc(phase)}</span></div>
      <div class="gtrack"><div class="gcells gbg" style="grid-template-columns:repeat(${n},var(--cw))">${bgCells}</div>${bars}</div></div>`;
  }).join('') || `<div class="grow"><div class="glabel" style="color:var(--faint)">—</div><div class="gtrack" style="display:flex;align-items:center;padding-left:16px;color:var(--faint);font-size:12.5px">등록된 공정이 없습니다. 우측 상단 <b style="margin:0 4px">공정 추가</b>로 시작하세요.</div></div>`;
  return`<div class="gwrap"><div class="gantt" style="--n:${n}">
    <div class="grow ghrow"><div class="glabel ghcorner">공정</div>
      <div class="gtrack ghtrack"><div class="gmonrow">${monthRow}</div><div class="gcells gdrow" style="grid-template-columns:repeat(${n},var(--cw))">${dayHead}</div></div></div>
    ${rows}
  </div></div>`;
}

/* 연속 달력 — 공사기간 전체를 주 단위로 표시 */
function calMarkup(p,lo,hi,today){
  const dows=['일','월','화','수','목','금','토'];
  const loD=new Date(lo), hiD=new Date(hi);
  const start=new Date(loD); start.setDate(loD.getDate()-loD.getDay());
  const end=new Date(hiD); end.setDate(hiD.getDate()+(6-hiD.getDay()));
  const days=[]; const cur=new Date(start); while(cur<=end){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const cells=days.map((d,idx)=>{
    const k=dkey(d), dow=d.getDay(), inRange=k>=lo&&k<=hi, showMo=d.getDate()===1||idx===0;
    const items=p.schedule.filter(s=>s.start<=k&&k<=s.end);
    const chips=items.map(s=>{const col=tradeColor(s.phase);const dn=s.status==='완료';
      return`<div class="chip ${dn?'done':''}" style="background:${mix(col,.15)};color:${col}" data-e-type="schedule" data-e-id="${s.id}" title="${esc(s.phase)} (${s.status})">
        ${dn?`<span class="ck">${svg(IC.check)}</span>`:''}<span style="overflow:hidden;text-overflow:ellipsis">${esc(s.phase)}</span></div>`;}).join('');
    return`<div class="cell ${inRange?'':'out'} ${(d.getMonth()%2)?'alt':''} ${k===today?'today':''}" data-qadd="${k}" style="cursor:pointer" title="눌러서 공정 추가">
      <span class="dn ${dow===0?'s0':''} ${dow===6?'s6':''}">${d.getDate()}${showMo?`<span class="mlab">${d.getMonth()+1}월</span>`:''}</span>${HOLIDAYS[k]?`<span class="hol">${HOLIDAYS[k]}</span>`:''}
      <div class="chips">${chips}</div></div>`;
  }).join('');
  return`<div class="cal">${dows.map((d,i)=>`<div class="dow s${i}">${d}</div>`).join('')}${cells}</div>`;
}

/* 공사 일정표 PDF — 공종(행) × 날짜(열) 간트 표, A4 가로 */
function printSchedule(){
  const p=proj(),i=p.info;
  const sds=p.schedule.map(s=>s.start).filter(Boolean).sort();
  const eds=p.schedule.map(s=>s.end).filter(Boolean).sort();
  const start=i.start||sds[0], end=i.end||eds[eds.length-1];
  if(!start||!end){showPreview('공사 일정표','<div style="padding:40px;text-align:center;color:#888">공사 기간과 공정을 먼저 입력하세요.</div>',true);return;}
  const days=[]; let cur=new Date(start); const endD=new Date(end); let g=0;
  while(cur<=endD&&g++<200){days.push(new Date(cur));cur.setDate(cur.getDate()+1);}
  const n=days.length;
  const dows=['일','월','화','수','목','금','토'];
  const isWe=d=>{const dow=d.getDay();return dow===0||dow===6||!!HOLIDAYS[dkey(d)];};
  // 공정을 이름별로 묶어 행 구성(시작일 순)
  const order=[], by={};
  p.schedule.slice().sort((a,b)=>(a.start||'').localeCompare(b.start||'')||(a.end||'').localeCompare(b.end||''))
    .forEach(s=>{const key=s.phase||'기타'; if(!by[key]){by[key]=[];order.push(key);} by[key].push(s);});
  const idxOf=ds=>daysBetween(start,ds);
  // 월 헤더(colspan)
  const months=[]; days.forEach(d=>{const my=d.getFullYear()+'-'+d.getMonth(); const last=months[months.length-1];
    if(last&&last.my===my)last.span++; else months.push({my,span:1,label:d.getFullYear()+'. '+(d.getMonth()+1)+'월'});});
  const monthTh=months.map(mo=>`<th class="pg-mo" colspan="${mo.span}">${mo.label}</th>`).join('');
  const dateTh=days.map(d=>{const dow=d.getDay(),we=isWe(d);
    return`<th class="pg-dt${dow===0?' sun':dow===6?' sat':''}${we?' pg-we':''}">${d.getDate()}<span class="dw">${dows[dow]}</span></th>`;}).join('');
  // 공정 막대 행 — 기간만큼 colspan으로 연속 채움
  const totalRows=Math.max(order.length,12);
  let rows='';
  for(let r=0;r<totalRows;r++){
    const ph=order[r];
    if(!ph){ const blanks=days.map(d=>`<td class="${isWe(d)?'pg-we':''}"></td>`).join('');
      rows+=`<tr><td class="pg-no">${r+1}</td><td class="pg-ph"></td>${blanks}<td class="pg-bigo"></td></tr>`; continue; }
    const col=tradeColor(ph); const segs=by[ph].slice().sort((a,b)=>(a.start||'').localeCompare(b.start||''));
    let cells=''; let idx=0;
    while(idx<n){
      const seg=segs.find(s=>idxOf(s.start)===idx);
      if(seg){ const ei=Math.min(n-1,idxOf(seg.end)); const span=Math.max(1,ei-idx+1);
        const dn=seg.status==='완료', late=seg.status==='지연';
        const bg=late?'rgba(210,75,62,.20)':mix(col,dn?.24:.42);
        cells+=`<td class="pg-bar" colspan="${span}" style="background:${bg}"><span class="pg-bl">${dn?'✓ ':''}${esc(seg.note||ph)}</span></td>`;
        idx+=span;
      } else { cells+=`<td class="${isWe(days[idx])?'pg-we':''}"></td>`; idx++; }
    }
    rows+=`<tr><td class="pg-no">${r+1}</td><td class="pg-ph"><span class="dot" style="background:${col}"></span>${esc(ph)}</td>${cells}<td class="pg-bigo"></td></tr>`;
  }
  const html=`<div class="pg-hd">
      <div class="pg-title">공 사 일 정 표</div>
      <table class="pg-meta">
        <tr><td class="k">공사명</td><td class="v">${esc(i.name)}</td><td class="k">공사기간</td><td class="v">${fdateF(start)} ~ ${fdateF(end)} (${weeks(start,end)}주)</td></tr>
        <tr><td class="k">현&nbsp;&nbsp;장</td><td class="v">${esc(i.address||i.siteInfo||'-')}</td><td class="k">담&nbsp;&nbsp;당</td><td class="v">${esc(i.manager||'-')}${i.contact?' / '+esc(i.contact):''}</td></tr>
      </table>
    </div>
    <table class="pgt">
      <colgroup><col style="width:26px"><col style="width:76px">${days.map(()=>'<col>').join('')}<col style="width:60px"></colgroup>
      <thead>
        <tr><th class="pg-corner" rowspan="2">NO</th><th class="pg-corner" rowspan="2">공&nbsp;종</th>${monthTh}<th class="pg-corner" rowspan="2">비고</th></tr>
        <tr>${dateTh}</tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="pg-legend">
      <span><i style="background:${mix('#7B8395',.42)}"></i>공정 기간</span>
      <span><i style="background:${mix('#12A45A',.24)}"></i>✓ 완료</span>
      <span><i style="background:rgba(210,75,62,.20)"></i>지연</span>
      <span><i class="pg-we"></i>주말·공휴일</span>
    </div>
    <div class="pg-foot">※ 상기 공사일정은 현장 상황에 따라 일부 공정에 변동이 있을 수 있습니다.　—　tofs studio</div>`;
  showPreview('공사 일정표',html,true);
}

  const closeT=()=>{if(openTbl){cur+='</table>';openTbl=false;}};
  const flush=()=>{closeT();if(cur){pages.push(`<div>${pageHead}${cur}</div>`);cur='';used=80;}};
  const secHd=(g,cont,n)=>{cur+=`<div class="eg-sechd" style="margin:${cur?'20px':'0'} 0 8px"><span>${esc(g)}${cont?' <small style="letter-spacing:1px;color:#98a099">(계속)</small>':''}${n?` <small style="letter-spacing:1px;color:#98a099">· ${n}개</small>`:''}</span></div>`;used+=46;};
  groups.forEach(g=>{
    const items=mats.filter(m=>m.group===g);
    if(used+46+72>MAXH)flush();
    closeT();
    secHd(g,false,items.length);
    openT();
    items.forEach(m=>{
      const h=m.img?70:40;
      if(used+h>MAXH){flush();secHd(g,true);openT();}
      cur+=rowHtml(m);used+=h;
    });
    closeT();
  });
  flush();
  return [cover,...pages];
}

        <div style="white-space:pre-wrap;color:var(--muted);margin-top:5px">${esc(l.body)}</div>

/* ── 아파트 공사 안내문 — 엘리베이터·1층 현관 게시용 A4 ── */
function noticeData(p){
  const i=p.info;
  const phases=[...new Set(p.schedule.map(s=>s.phase).filter(Boolean))];
  /* 고소음 공정(철거·목공·타일)은 일정에서 날짜를 읽어와 소음 안내에 자동 반영 */
  const NOISY_PHASES=['철거','목공','타일'];
  const loud=p.schedule.filter(s=>s.start&&NOISY_PHASES.some(k=>(s.phase||'').includes(k))).slice().sort((a,b)=>a.start.localeCompare(b.start));
  const rng=s=>`${s.phase} ${fdate(s.start)}${s.end&&s.end!==s.start?`~${fdate(s.end)}`:''}`;
  const autoNoisy=loud.length?`소음이 큰 작업은 ${loud.map(rng).join(', ')} 일정으로 진행됩니다. 해당 기간에는 소음이 다소 클 수 있으며, 최대한 신속히 마무리하겠습니다.`:'';
  const d=Object.assign({
    unit:i.address||'',
    start:i.start||todayStr(), end:i.end||'',
    hours:'평일 09:00 ~ 18:00 (주말·공휴일 작업 없음)',
    works:phases.join(' · ')||'철거 · 설비 · 목공 · 타일 · 도배 · 마루',
    greet:'안녕하세요, 입주민 여러분.\n아래 세대의 실내 인테리어 공사를 진행하게 되어 안내드립니다.\n공사 기간 중 소음과 분진, 자재 운반으로 불편을 드리게 되어 미리 깊은 양해의 말씀을 드립니다.',
    noisy:'철거·타공 등 소음이 큰 작업은 공사 초반 2~3일에 집중되며, 최대한 신속히 마무리하겠습니다.',
    close:'공용 부위(엘리베이터·복도)는 보양재로 보호하고 작업 후 매일 청소하겠습니다.\n정해진 기간 내 공사를 마칠 수 있도록 최선을 다하겠으며, 불편사항은 아래 연락처로 연락 주시면 즉시 조치하겠습니다.',
    manager:i.manager||CO().ceo||'',
    contact:(CO().tel||'').split('/')[0].trim()||i.contact||''
  },p.notice||{});
  if(autoNoisy)d.noisy=autoNoisy; /* 일정이 바뀌면 소음 안내도 항상 최신 날짜로 */
  return d;
}
function noticeSheet(d){

  const period=d.start&&d.end?`${fdateF(d.start)} ~ ${fdateF(d.end)} <span style="font-weight:600;color:#8A93A2;font-size:13px">(약 ${weeks(d.start,d.end)}주)</span>`:esc(fdateF(d.start));

/* ===== 지출 ===== */
const EXP_KINDS=['자재','인건','외주','경비','기타'];

/* ── 은행 거래내역 가져오기 (신한 쏠·인터넷뱅킹 엑셀/붙여넣기) ── */
const parseAmt=s=>Math.round(Number(String(s==null?'':s).replace(/[^0-9.\-]/g,''))||0);
const bankDate=s=>{const m=/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/.exec(String(s));return m?`${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`:'';};
const txHash=t=>[t.date,t.amount,t.vendor||'',t.bal==null?'':t.bal].join('|');
/* 붙여넣은 텍스트 → 2차원 배열. 탭이 있으면 TSV(엑셀 복사), 없으면 CSV(따옴표 처리) */
function parseGridText(text){
  const t=String(text||'').replace(/\r\n?/g,'\n');
  if(t.indexOf('\t')>=0)return t.split('\n').map(l=>l.split('\t'));
  const rows=[[]];let cur='',q=false;
  for(let i=0;i<t.length;i++){const ch=t[i];
    if(q){if(ch==='"'){if(t[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else if(ch==='"')q=true;
    else if(ch===','){rows[rows.length-1].push(cur);cur='';}
    else if(ch==='\n'){rows[rows.length-1].push(cur);cur='';rows.push([]);}
    else cur+=ch;}
  rows[rows.length-1].push(cur);
  return rows;
}
/* 2차원 배열 → 출금 건만 추출. 헤더 행을 키워드로 자동 탐색해 은행별 컬럼 순서 차이를 흡수 */
function parseBankRows(rows){
  const norm=s=>String(s==null?'':s).replace(/[\s()원,]/g,'');
  const KW={date:['거래일자','거래일시','거래일','일자','날짜'],
    out:['출금액','출금','찾으신금액','지급'],
    desc:['적요'],
    vendor:['기재내용','거래내용','내용','받는분','의뢰인/수취인','수취인','거래처','보낸분/받는분'],
    bal:['잔액']};
  const findCol=(cells,kws)=>{for(const w of kws){const i=cells.findIndex(c=>c===w);if(i>=0)return i;}
    for(const w of kws){const i=cells.findIndex(c=>c&&c.indexOf(w)>=0);if(i>=0)return i;}return -1;};
  let hi=-1,col={};
  for(let r=0;r<Math.min(rows.length,15);r++){
    const cells=(rows[r]||[]).map(norm),m={};
    for(const k in KW)m[k]=findCol(cells,KW[k]);
    if(m.date>=0&&m.out>=0){hi=r;col=m;break;}
  }
  if(hi<0)return{err:'거래내역 컬럼(거래일자·출금)을 찾지 못했습니다. 제목 줄까지 포함해서 붙여넣어 주세요.',items:[],skipped:0};
  const items=[];let skipped=0;
  for(let r=hi+1;r<rows.length;r++){
    const row=rows[r]||[];if(!row.some(c=>String(c==null?'':c).trim()))continue;
    const date=bankDate(row[col.date]),out=parseAmt(row[col.out]);
    if(!date||out<=0){skipped++;continue;} /* 입금·합계·형식 불명 행 제외 */
    const vend=col.vendor>=0?String(row[col.vendor]==null?'':row[col.vendor]).trim():'';
    const de=col.desc>=0?String(row[col.desc]==null?'':row[col.desc]).trim():'';
    items.push({date,amount:out,vendor:vend||de||'—',desc:vend&&de&&de!==vend?de:'',bal:col.bal>=0?parseAmt(row[col.bal]):null});
  }
  return{items,skipped};
}
/* SheetJS는 파일 업로드 때만 CDN에서 지연 로드 (붙여넣기는 라이브러리 불필요) */

    s.onload=res;s.onerror=()=>{_sheetjs=null;rej(new Error('cdn'));};document.head.appendChild(s);});}

/* 미분류 거래 카드 — 현장·종류만 지정해 확정하면 해당 현장 지출로 이동 */
function bankInboxCard(){

/* ===== 견적 (estimates) ===== */
const EST_TYPE={item:'아이템 견적서',construction:'시공 견적서'};
function nextEstNo(p){
  const yr=todayStr().slice(0,4);
  const nums=(p.estimates||[]).map(e=>{const m=/EST-\d+-(\d+)/.exec(e.no||'');return m?+m[1]:0;});
  const n=(nums.length?Math.max(...nums):0)+1;
  return`EST-${yr}-${String(n).padStart(3,'0')}`;
}
function newEstItem(){return{id:uid(),name:'',spec:'',unit:'',qty:'',mp:'',lp:''};}
function newEstimate(type){
  const p=proj(),i=p.info;
  const est={id:uid(),no:nextEstNo(p),type,date:todayStr(),
    client:i.client||'',clientAddr:i.address||'',sizePy:String(i.area||'').replace(/[^0-9.]/g,''),
    rates:{gongwa:3,profit:10,sanjae:0.96,goyong:0.27},
    target:'',vat:'별도',validDays:30,progress:100,
    remarks:'부가세 별도\n전기 증설 별도\n견적 외 별도',
    sections:type==='construction'
      ?[{id:uid(),name:'공통가설공사',items:[newEstItem()]}]
      :[{id:uid(),name:'품목',items:[newEstItem()]}]};
  p.estimates=p.estimates||[];p.estimates.push(est);save();
  state.estOpen=est.id;render();
}
function estCalc(est){
  const secs=(est.sections||[]).map(s=>({name:s.name,
    total:s.items.reduce((a,it)=>{const q=+it.qty||0;return a+((+it.mp||0)+(+it.lp||0))*q;},0)}));
  const direct=secs.reduce((a,b)=>a+b.total,0);
  let ind=[];
  if(est.type==='construction'){
    const r=est.rates||{};
    ind=[['공과잡비',(+r.gongwa||0)],['기업이윤',(+r.profit||0)],['산재보험',(+r.sanjae||0)],['고용보험',(+r.goyong||0)]]
      .map(x=>[x[0],Math.round(direct*x[1]/100)]);
  }
  const indirect=ind.reduce((a,b)=>a+b[1],0);
  const sub=direct+indirect;
  const target=+est.target||0;
  const discount=(target&&target<sub)?sub-target:0;
  return{secs,direct,ind,indirect,sub,discount,grand:sub-discount};
}

function refreshEst(c,est){
  const cal=estCalc(est);
  est.sections.forEach((sec,si)=>{
    const card=c.querySelector(`.est-sec[data-sec="${sec.id}"]`);if(!card)return;
    sec.items.forEach(it=>{
      const q=+it.qty||0,tot=((+it.mp||0)+(+it.lp||0))*q;
      const cell=card.querySelector(`tr[data-eit="${it.id}"] .row-amt`);
      if(cell)cell.textContent=tot?tot.toLocaleString('ko-KR'):'';
    });
    const st=card.querySelector('.sec-total');if(st)st.textContent=won(cal.secs[si]?cal.secs[si].total:0);
  });
  const sm=document.getElementById('estSummary');if(sm)sm.innerHTML=estSummaryHtml(cal,est.type==='construction');
}

  const rm=document.getElementById('estRemarks');rm.onchange=()=>{est.remarks=rm.value;save();};
  c.querySelectorAll('.est-sec').forEach(card=>{
    const sec=est.sections.find(s=>s.id===card.dataset.sec);if(!sec)return;

    const ds=card.querySelector('[data-del-sec]');
    if(ds)ds.onclick=()=>{if(est.sections.length<=1){alert('마지막 공종은 삭제할 수 없습니다.');return;}
      if(!confirm('이 공종과 품목을 모두 삭제할까요?'))return;

    });
  });
  const asBtn=document.getElementById('addSection');
  if(asBtn)asBtn.onclick=()=>{est.sections.push({id:uid(),name:'',items:[newEstItem()]});save();render();};
  refreshEst(c,est);

function vHome(c){
  const today=todayStr();
  /* 이름·데이터가 없는 "새 프로젝트"는 아직 현장이 아니므로 집계·목록에서 제외 */
  const isBlank=p=>((p.info.name||'').trim()==='새 프로젝트')&&!(p.schedule||[]).length&&!(p.expenses||[]).length&&!(p.estimates||[]).length&&!(p.contracts||[]).length&&!(p.logs||[]).length&&!+p.info.amount;
  const act=DB.projects.filter(p=>!isArchived(p)&&!isBlank(p));
  const blanks=DB.projects.filter(p=>!isArchived(p)&&isBlank(p));
  const arch=DB.projects.filter(isArchived);
  const allTodos=act.reduce((s,p)=>s+(p.todos||[]).filter(t=>!t.done).length,0);
  const runningPh=act.reduce((s,p)=>s+(p.schedule||[]).filter(x=>x.start<=today&&today<=x.end&&x.status!=='완료').length,0);
  const cards=act.map(p=>{
    const i=p.info, sch=(p.schedule||[]);
    const nowPh=sch.filter(x=>x.start<=today&&today<=x.end);
    const nextPh=sch.filter(x=>x.start>today).sort((a,b)=>a.start.localeCompare(b.start))[0];
    const done=sch.filter(x=>x.status==='완료').length;
    /* 기간 경과율 */
    let prog=null;
    if(i.start&&i.end){const t=daysBetween(i.start,today),tot=Math.max(1,daysBetween(i.start,i.end));prog=Math.max(0,Math.min(100,Math.round(t/tot*100)));}
    /* 미니 타임라인 스트립 */
    let strip='';
    if(i.start&&i.end&&sch.length){
      const lo=i.start,hi=i.end,tot=Math.max(1,daysBetween(lo,hi));
      const seg=sch.map(s=>{
        const a=Math.max(0,daysBetween(lo,s.start)),b=Math.min(tot,daysBetween(lo,s.end)+1);
        if(b<=a)return'';
        const col=tradeColor(s.phase);
        return`<i title="${esc(s.phase)} ${fdate(s.start)}~${fdate(s.end)}" style="left:${a/tot*100}%;width:${(b-a)/tot*100}%;background:${col};opacity:${s.status==='완료'?.45:.95}"></i>`;
      }).join('');
      const tp=Math.max(0,Math.min(100,daysBetween(lo,today)/tot*100));
      strip=`<div class="hstrip">${seg}${(today>=lo&&today<=hi)?`<b style="left:${tp}%"></b>`:''}</div>
        <div class="hstrip-lb"><span>${fdate(i.start)}</span><span>${fdate(i.end)}</span></div>`;
    }
    return`<div class="card hcard" data-goproj="${p.id}">
      <div class="pad" style="padding-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <b style="font-size:15px">${esc(i.name)}</b>
          ${pill(i.status||'진행중',PRJ_ST)}
          ${prog!=null?`<span class="sub num">기간 ${prog}%</span>`:''}
          <span class="spacer" style="flex:1"></span>
          <span class="sub">${i.manager?esc(i.manager)+' · ':''}공정 ${sch.length?done+'/'+sch.length:'미등록'}</span>
        </div>
        ${strip||`<div class="sub" style="margin-top:8px">공사 기간·공정이 아직 등록되지 않았습니다.</div>`}
        <div style="display:flex;gap:14px;margin-top:9px;flex-wrap:wrap;font-size:12.5px">
          <span>🔨 <b>오늘</b> ${nowPh.length?nowPh.map(x=>`<span class="tag" style="color:${tradeColor(x.phase)}">${esc(x.phase)}</span>`).join(' '):'<span class="sub">작업 없음</span>'}</span>
          ${nextPh?`<span>⏭️ <b>다음</b> <span class="tag">${esc(nextPh.phase)}</span> <span class="sub num">${fdate(nextPh.start)}~</span></span>`:''}
          ${i.statusMemo?`<span class="sub">📝 ${esc(i.statusMemo)}</span>`:''}
        </div>
      </div></div>`;
  }).join('');
  c.innerHTML=`
  <div class="vhead"><div><div class="t">우리 현장 한눈에</div><div class="d">진행 중인 모든 현장의 일정 현황입니다. 카드를 누르면 해당 현장으로 이동합니다.</div></div></div>
  <div class="kpis" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi tint"><div class="k">진행 중 현장</div><div class="v num">${act.length}<small>곳</small></div></div>
    <div class="kpi"><div class="k">오늘 진행 공정</div><div class="v num">${runningPh}<small>개</small></div></div>
    <div class="kpi"><div class="k">해야할 일</div><div class="v num">${allTodos}<small>건</small></div></div>
    <div class="kpi"><div class="k">완료·보관 현장</div><div class="v num">${arch.length}<small>곳</small></div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:14px">
    <div class="card"><div class="card-h"><span class="ct">메모</span><span class="cs">자유롭게 적어두세요 — 자동 저장</span></div>
      <div class="pad" style="padding-top:8px"><textarea id="homeMemo" placeholder="예: 다음주 목자재 발주 확인, 세금계산서 발행, 김실장 미팅…" style="width:100%;min-height:132px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);color:inherit;padding:10px 12px;font:inherit;font-size:13px;line-height:1.7;resize:vertical">${esc(DB.homeMemo||'')}</textarea></div></div>
    <div class="card"><div class="card-h"><span class="ct">현장별 메모</span><span class="cs">각 현장의 상황 메모 — 여기서 바로 수정됩니다</span></div>
      <div class="pad" style="padding-top:8px;display:flex;flex-direction:column;gap:9px">
        ${act.map(p=>`<div style="display:flex;align-items:center;gap:10px">
          <b style="flex:none;width:112px;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" data-goproj2="${p.id}" title="현장 열기">${esc(p.info.name)}</b>
          <input class="memoinput" data-pmemo="${p.id}" placeholder="상황 메모 (예: 입주 8/20 예정)" value="${esc(p.info.statusMemo||'')}" style="flex:1"></div>`).join('')||'<div class="sub">진행 중인 현장이 없습니다.</div>'}
      </div></div>
  </div>
  ${blanks.length?`<div class="tip">📁 아직 정보를 입력하지 않은 <b>새 프로젝트 ${blanks.length}개</b>는 집계에서 제외했어요. 상단 현장 선택에서 열어 정보를 입력하거나, 정보 수정에서 삭제하세요.</div>`:''}
  ${cards||`<div class="card">${emptyB('진행 중인 현장이 없습니다.','')}</div>`}`;
  c.querySelectorAll('[data-goproj]').forEach(cd=>cd.onclick=()=>{DB.active=cd.dataset.goproj;state.tab='schedule';save();render();});
  const hm=document.getElementById('homeMemo');let hmT=null;
  hm.oninput=()=>{DB.homeMemo=hm.value;clearTimeout(hmT);hmT=setTimeout(save,600);};
  c.querySelectorAll('[data-pmemo]').forEach(inp=>inp.onchange=()=>{const p=DB.projects.find(x=>x.id===inp.dataset.pmemo);if(p){p.info.statusMemo=inp.value;save();}});
  c.querySelectorAll('[data-goproj2]').forEach(b=>b.onclick=()=>{DB.active=b.dataset.goproj2;state.tab='schedule';save();render();});
}

function loadPricePreset(silent){
  DB.priceDB=DB.priceDB||[];
  let n=0;
  PRICE_PRESET.forEach(r=>{
    const[cat,name,spec,unit,mp,lp]=r;
    if(DB.priceDB.some(x=>x.name===name&&x.spec===spec))return;
    DB.priceDB.push({id:uid(),cat,name,spec,unit,mp:mp||'',lp:lp||'',note:mp?'시세 참고가 — 발주 전 확인':''});
    n++;
  });
  if(silent)return n;
  save();render();
  toast(n?`기본 자재 ${n}개를 불러왔습니다 (가격은 참고가 — 수정 가능)`:'이미 모두 등록되어 있습니다');
}

/* 단가 DB에서 골라 담기 (견적·발주 공용) */
function openPricePicker(onPick){
  DB.priceDB=DB.priceDB||[];
  const ov=document.createElement('div');ov.className='overlay';
  const build=q=>{
    const rows=DB.priceDB.filter(x=>!q||[x.cat,x.name,x.spec].join(' ').includes(q));
    return rows.length?`<table><thead><tr><th>분류</th><th>품명</th><th>규격</th><th class="c">단위</th><th class="r">자재</th><th class="r">노무</th><th></th></tr></thead>
      <tbody>${rows.map(x=>`<tr><td><span class="tag">${esc(x.cat||'—')}</span></td><td class="strong">${esc(x.name)}</td><td class="sub num">${esc(x.spec||'')}</td>
      <td class="c sub">${esc(x.unit||'')}</td><td class="r num sub">${+x.mp?numf(+x.mp):'—'}</td><td class="r num sub">${+x.lp?numf(+x.lp):'—'}</td>
      <td class="r"><button class="btn sm green" data-pick="${x.id}">담기</button></td></tr>`).join('')}</tbody></table>`
      :`<div class="empty" style="padding:30px">검색 결과가 없습니다.<br><span class="sub">자재·노무 탭에서 단가를 먼저 등록해 주세요.</span></div>`;
  };
  ov.innerHTML=`<div class="modal" style="width:min(680px,100%)"><h2>단가 DB에서 담기</h2>
    <div class="msub">담기를 누르면 바로 추가됩니다. 여러 개를 연속으로 담을 수 있어요.</div>
    <div style="padding:10px 22px 0"><input class="oh" id="ppQ" placeholder="검색 (품명·규격·분류)" style="width:100%"></div>
    <div style="padding:12px 22px;overflow-y:auto;max-height:52vh" id="ppList">${build('')}</div>
    <div class="modal-foot"><span class="sub" id="ppCnt"></span><div class="right"><button class="btn green" id="ppDone">완료</button></div></div></div>`;
  document.body.appendChild(ov);
  let added=0;
  const close=()=>{ov.remove();if(added)render();};
  ov.addEventListener('mousedown',e=>{if(e.target===ov)close();});
  ov.querySelector('#ppDone').onclick=close;
  const list=ov.querySelector('#ppList'),qi=ov.querySelector('#ppQ'),cnt=ov.querySelector('#ppCnt');
  const wire=()=>list.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{
    const it=DB.priceDB.find(x=>x.id===b.dataset.pick);if(!it)return;
    onPick(it);added++;cnt.textContent=added+'개 담음';
    b.textContent='✓';b.disabled=true;setTimeout(()=>{b.textContent='담기';b.disabled=false;},700);
  });
  qi.oninput=()=>{list.innerHTML=build(qi.value.trim());wire();};
  wire();if(!IS_TOUCH)qi.focus();
}

/* ===== 계약서 (contracts) ===== */
/* 금액 → 한글 (예: 101200000 → 일억백이십만) */
function wonHangul(n){
  n=Math.floor(+n||0); if(!n)return'영';
  const d=['','일','이','삼','사','오','육','칠','팔','구'], su=['','십','백','천'], gu=['','만','억','조'];
  let out='',gi=0;
  while(n>0){
    const g=n%10000;
    if(g){
      let s=''; String(g).split('').reverse().forEach((ch,i)=>{const v=+ch;if(!v)return;s=((v===1&&i>0)?'':d[v])+su[i]+s;});
      out=s+gu[gi]+out;
    }
    n=Math.floor(n/10000); gi++;
  }
  return out;
}

{t:'제 4 조 【공사 감독원】',b:['1. "갑"은 자신을 대리하여 다음 각호의 사항을 행하는 자(이하 \'공사감독원\'이라 한다)를 선임할 수 있다.','&nbsp;&nbsp;① 시공일반에 대하여 감독하고 입회하는 일','&nbsp;&nbsp;② 계약이행에 있어서 "을"에 대한 지시·승낙 또는 협의하는 일','&nbsp;&nbsp;③ 공사의 재료와 시공에 대한 검사 또는 시험에 입회하는 일','&nbsp;&nbsp;④ 공사의 기성부분 검사, 준공검사 또는 공사목적물의 인도에 입회하는 일','&nbsp;&nbsp;⑤ 기타, 공사감독에 관하여 "갑"이 위임하는 일','2. "갑"은 제1항의 규정에 의하여 공사감독원을 선임한 때에는 그 사실을 즉시 "을"에게 통지하여야 한다.','3. "을"은 공사감독원의 감독 또는 지시사항이 공사수행에 현저히 부당하다고 인정할 때에는 "갑"에게 그 사유를 명시하여 필요한 조치를 요구할 수 있다.','4. "갑"이 제1항의 공사감독원을 선임하지 않은 경우 계약서에 달리 규정된 사항이 없는 한 공사현장에 상주하는 "갑"의 직원 중 최 상급자를 공사감독원으로 본다.']},
{t:'제 5 조 【공사기간의 연장】',b:['1. "갑"의 책임 있는 사유 또는 천재지변, 불가항력의 사태 등 "을"의 책임이 아닌 사유로 공사수행이 지연되는 경우 "을"은 서면으로 공사기간의 연장을 "갑"에게 요구할 수 있다.','2. "갑"은 제1항의 규정에 의한 계약기간 연장의 요구가 있는 경우 즉시 그 사실을 조사·확인하고 공사가 적절히 이행될 수 있도록 계약기간의 연장 등 필요한 조치를 하여야 한다.','3. "갑"은 제1항의 계약기간의 연장승인시 공사연장 기간에 대하여 지체상금을 부과하지 아니한다.']},
{t:'제 6 조 【공사의 변경, 중지】',b:['1. "갑"은 필요하다고 인정하거나 공사내용의 변경, 추가 또는 공사의 전부나 일부에 대한 시공을 일시적으로 중지할 경우에는 변경계약서 등 서면을 사전 "을"에게 교부해야 한다.']},
{t:'제 7 조 【준공검사】',b:['1. "을"은 공사를 완성한 때에는 "갑"에게 통지하여야 하며 "갑"은 통지를 받은 날로부터 3일 이내에 "을"을 동행하여 공사목적물에 대하여 검사하여야 한다. 만일, "갑"이 "을"의 통지를 받은 후 5일 이내에 검수 결과를 통지하지 아니한 경우에는 5일이 경과한 날에 검수에 합격한 것으로 간주한다. 다만, 천재지변 등 불가항력적인 사유로 인하여 검사를 완료하지 못한 경우에는 당해 사유가 존속되는 기간과 당해 사유가 소멸된 날로부터 3일까지는 이를 연장할 수 있다.','2. "을"은 제1항의 검사에 합격하지 못한 때에는 이를 보수 또는 개조하여 다시 검사를 받아야한다.','3. "을"은 검사의 결과에 이의가 있을 때에는 재검사를 요구할 수 있으며, "갑"은 이에 응하여야 한다.','4. "갑"은 제1항의 규정에 의한 검사 합격 후 "을"이 공사목적물의 인수를 요청하면 즉시 현장인수증명서를 발급하고 공사목적물을 인수하여야 한다.']},
{t:'제 8 조 【설계변경으로 인한 계약금액의 조정】',b:['1. "갑"의 책임 있는 귀책사유로 인해 시공에 관하여 예기하지 못한 사태가 발생되거나 사업계획의 변경 등으로 인하여 추가 시설물의 설치가 필요한 때에는 설계를 변경하여야 한다.','2. 제1항의 설계변경으로 인하여 공사량의 증감이 발생한 때에는 "갑"과 "을"이 서로 협의하여 계약금액을 조정하며, 필요한 경우 공사기간을 연장하거나 단축할 수 있다. 이때 증감된 공사의 단가는 "을"이 제시한 산출내역서를 기준으로 하되 증감된 공사에 대한 일반관리비 및 이윤 등은 상호 협의하여 결정한다.']},
{t:'제 9 조 【하자보증】',b:['1. "을"은 "갑"이 공사목적물을 인수한 날과 준공검사를 마친 날 중에서 먼저 도래한 날로부터 계약서에 정한 하자보증기간 중 당해 공사에 발생하는 일체의 하자를 "을"의 부담으로 보수하여야 한다.','2. 공사부위가 소모품(전구, 수전 기타등등) 설치 및 부품일 경우 "을"은 책임을 면한다.','3. 사용자의 부주의 및 사용상의 하자(유리 및 집기의 손상 포함)가 발생할 시에는 "을"은 책임을 면한다.']},
{t:'제 10 조 【갑의 계약해제 등】',b:['1. "을"은 다음 각호에 해당하는 경우에는 계약의 전부 또는 일부를 해제 또는 해지할 수 있다.','&nbsp;&nbsp;① "을"이 정당한 이유없이 약정한 착공기일을 경과하고도 공사에 착수하지 아니한 경우','&nbsp;&nbsp;② "을"의 책임 있는 사유로 인하여 준공기일 내에 공사를 완성할 가능성이 없음이 명백한 경우','&nbsp;&nbsp;③ "을"이 관할 행정청으로부터 면허 또는 등록의 취소, 업무정지 등의 처분을 받은 경우','2. 천재지변 등의 부득이 한 사유로 계약이행이 곤란하게 된 경우에는 상대방과 협의하여 계약을 해제 해지할 수 있다.','3. 제1항의 규정에 의한 통지를 받은 때에는 다음의 사항을 준수하여야 한다.','&nbsp;&nbsp;① 해약통지서를 받은 부분에 대한 공사를 지체없이 중지하고 모든 공사관련 시설 및 장비등을 공사현장으로부터 철거한다.','&nbsp;&nbsp;② "갑"의 대여품이 있을 때에는 지체없이 "갑"에게 반환한다. 이 경우 당해 대여품이 "을"의 고의 또는 과실로 인하여 멸실 또는 파손되었을 때에는 원상회복 또는 그 손해액을 배상한다.']},
{t:'제 11 조 【을의 계약해제 등】',b:['1. "을"은 다음 각호에 해당하는 경우에는 계약의 전부 또는 일부를 해제 또는 해지할 수 있다.','&nbsp;&nbsp;① 공사내용을 변경함으로써 계약금액이 100분의 30 이상 감소된 때','&nbsp;&nbsp;② "갑"의 책임 있는 사유에 의한 공사의 정지기간이 계약서상의 공사기간의 100분의 30을 초과한 때','&nbsp;&nbsp;③ "갑"이 정당한 이유없이 계약내용(대금지급포함)을 이행하지 아니함으로써 공사의 적정이행이 불가능 하다고 인정되는 때','2. 제1항의 규정에 의한 계약의 해제 또는 해지는 "을"이 "갑"에게 서면으로 계약이행기간을 정하여 통보한 후 제시한 기간내에 이행되지 아니한 때 효력이 발생한다.']},
{t:'제 12 조 【계약해지시의 처리】',b:['1. 제10조 및 제11조의 규정에 의한 계약의 해제 또는 해지로 인하여 손해가 발생한때에는 상대방에게 그에 대한 배상을 청구할 수 있다.']},
{t:'제 13 조 【계약의 양도 및 변경 등】',b:['1. "갑"과 "을"은 상대방의 승낙 없이는 이 계약상의 권리·의무를 제3자에게 양도, 대여, 담보제공 등 기타 처분행위를 할 수 없다.','2. "갑"의 계획변경, 관계법규의 개·폐, 천재지변 등 불가항력적인 사유의 발생으로 설계업무를 수정하거나 계약기간을 연장할 상당한 이유가 있는 때에는 "갑"과 "을"은 서로 협의하여 계약의 내용을 변경할 수 있다.','3. "을"은 공사목적물 또는 공사현장에 반입하여 검사를 필 한 공사자재에 대하여 제3자에게 매각, 양도 또는 대여하거나 담보목적으로 제공할 수 없다.']},

function newContract(){
  const p=proj(),i=p.info;
  const nm=i.name||'';
  const ctr={id:uid(),date:todayStr(),
    siteName:nm+(/인테리어|공사/.test(nm)?' 공사':' 인테리어 공사'),siteAddr:i.address||'',
    start:i.start||'',end:i.end||'',amount:i.amount||'',
    payments:[
      {id:uid(),label:'계약금',pct:'50',note:'계약 당일 지급'},
      {id:uid(),label:'중도금',pct:'25',note:'공정 50% 시점 지급'},
      {id:uid(),label:'잔금',pct:'25',note:'준공 후 10일 이내 지급'}],
    defectRate:'100분의 10',defectMonths:'12',delayRate:'1/1000',
    bank:CO().bank||'',etc:'',

  state.ctrOpen=ctr.id;render();
}

/* 도급조건은 분량이 A4 한 장을 넘으므로 조항 단위로 여러 페이지에 나눠 담는다 */
function ctrTermsPages(){
  const lines=a=>1.6+a.b.reduce((s,x)=>s+Math.ceil(String(x).replace(/&nbsp;/g,' ').replace(/<[^>]*>/g,'').length/54),0);
  const MAX=50; /* A4(psheet) 한 장에 들어가는 대략의 줄 수 */
  const chunks=[];let cur=[],used=4; /* 첫 장은 제목만큼 여유를 뺌 */
  CTR_TERMS.forEach(a=>{const L=lines(a);
    if(used+L>MAX&&cur.length){chunks.push(cur);cur=[];used=0;}
    cur.push(a);used+=L;});
  if(cur.length)chunks.push(cur);
  return chunks.map((arts,pi)=>`<div class="ctrterms">
    ${pi===0?'<div class="ctrterms-h1">도급 계약조건</div>':''}
    ${arts.map(a=>`<div class="ctr-art"><div class="at">${esc(a.t)}</div>${a.b.map(x=>`<div class="ab">${x}</div>`).join('')}</div>`).join('')}
    <div style="text-align:center;color:#aaa;font-size:9px;margin-top:18px">— 도급 계약조건 ${pi+1} / ${chunks.length} —</div>
  </div>`);
}

function ctrEff(ctr){
  const i=proj().info;
  const eff=Object.assign({},ctr);
  if(!eff.siteAddr)eff.siteAddr=i.address||'';
  if(!eff.start)eff.start=i.start||'';
  if(!eff.end)eff.end=i.end||'';
  if(!+eff.amount)eff.amount=i.amount||'';
  if(!eff.clientCo)eff.clientCo=i.client||'';
  if(!eff.bank)eff.bank=CO().bank||'';
  return eff;
}
function openCtrPreview(ctr){
  const e=ctrEff(ctr);
  showPreview('공사계약서',[ctrCoverHtml(e),ctrMainHtml(e),ctrSignHtml(e),...ctrTermsPages()],false);
}

    {k:'spec',l:'규격'},{k:'qty',l:'수량',t:'number'},{k:'unit',l:'단위'},{k:'price',l:'단가',t:'number',money:1},
    {k:'orderDate',l:'발주일',t:'date'},{k:'dueDate',l:'납기일',t:'date'},{k:'status',l:'상태',t:'select',opt:Object.keys(ORD_ST)}]},
  logs:{title:'현장일지',sub:'현장 상황을 기록하고 그날 찍은 사진을 함께 첨부합니다.',fields:[
    {k:'date',l:'날짜',t:'date',req:1},{k:'author',l:'작성자'},{k:'title',l:'제목',req:1,full:1},{k:'body',l:'내용',t:'textarea',full:1,req:1},
    {k:'photos',l:'사진',t:'images',full:1}]},
  expenses:{title:'지출',sub:'현장 지출 내역을 입력합니다.',fields:[
    {k:'date',l:'날짜',t:'date',req:1},{k:'kind',l:'종류',t:'select',opt:EXP_KINDS,req:1},
    {k:'phase',l:'공정',dl:'trades',hint:'기본 공정에서 선택'},{k:'vendor',l:'거래처'},{k:'desc',l:'내역',full:1},
    {k:'amount',l:'금액',t:'number',money:1,req:1},{k:'method',l:'결제수단',t:'select',opt:['계좌이체','카드','현금','기타']},
    {k:'vat',l:'부가세',t:'select',opt:['별도','포함','없음']},{k:'payStatus',l:'결제상태',t:'select',opt:Object.keys(EXP_ST)}]},
  files:{title:'파일 링크',sub:'도면·견적서 등 파일 링크를 등록합니다.',fields:[
    {k:'name',l:'이름',req:1,full:1},{k:'url',l:'링크·경로',full:1,hint:'https:// 또는 파일 경로'},{k:'date',l:'등록일',t:'date'}]},
  company:{title:'회사 정보',sub:'견적서·계약서 등 모든 문서에 자동으로 들어가는 우리 회사 정보입니다.',fields:[
    {k:'name',l:'회사명',req:1,full:1},{k:'ceo',l:'대표자'},{k:'reg',l:'사업자등록번호'},
    {k:'addr',l:'주소',full:1},{k:'tel',l:'전화'},{k:'email',l:'이메일'},
    {k:'biz',l:'업태'},{k:'bizType',l:'종목'},{k:'bank',l:'입금계좌',full:1,hint:'계약서에 표시됩니다'},
    {k:'logo',l:'로고 이미지 (문서 표지·계약서에 사용)',t:'image',full:1},
    {k:'logoSize',l:'로고 크기 %',t:'number',hint:'기본 100 — 크게 150, 작게 70 등으로 조절'}]},
  coexp:{title:'회사 지출',sub:'임대료·차량·보험처럼 특정 현장에 속하지 않는 회사 공통 지출입니다.',fields:[
    {k:'date',l:'날짜',t:'date',req:1},{k:'kind',l:'종류',t:'select',opt:EXP_KINDS,req:1},
    {k:'vendor',l:'거래처'},{k:'desc',l:'내역',full:1},
    {k:'amount',l:'금액',t:'number',money:1,req:1},{k:'method',l:'결제수단',t:'select',opt:['계좌이체','카드','현금','기타']},
    {k:'vat',l:'부가세',t:'select',opt:['별도','포함','없음']},{k:'payStatus',l:'결제상태',t:'select',opt:Object.keys(EXP_ST)},
    {k:'memo',l:'비고',full:1}]},
  vendors:{title:'업체',sub:'거래 업체 연락처를 등록합니다. 발주서 전송(카톡·이메일)의 기반 정보가 됩니다.',fields:[
    {k:'name',l:'업체명',req:1},{k:'vtype',l:'구분',t:'select',opt:['자재업체','시공업체','기타']},
    {k:'category',l:'분야',dl:'trades',hint:'예: 목공, 타일, 자재상'},
    {k:'contact',l:'담당자'},{k:'phone',l:'전화'},
    {k:'email',l:'이메일'},{k:'kakao',l:'카톡 ID'},
    {k:'items',l:'주요 품목',full:1,hint:'예: 합판·각재·석고보드'},{k:'memo',l:'비고',full:1}]},
};
/* 프로젝트가 아닌 DB(회사) 레벨에 저장되는 폼 타입 */
const DB_FORM_TARGET={price:'priceDB',coexp:'coExpenses',vendors:'vendors'};
let overlayEl=null;
function openForm(type,existing){
  const cfg=FORMS[type],editing=!!existing,data=existing||{};
  const fh=cfg.fields.map(f=>{const val=data[f.k]!=null?data[f.k]:(f.t==='date'&&!editing&&(f.k==='date')?todayStr():'');
    let input;
    if(f.t==='select')input=`<select name="${f.k}">${f.opt.map(o=>`<option ${String(val)===o?'selected':''}>${o}</option>`).join('')}</select>`;
    else if(f.t==='textarea')input=`<textarea name="${f.k}" placeholder="${f.hint||''}">${esc(val)}</textarea>`;
    else if(f.t==='images')input=`<div data-imgs="${f.k}">
      <input type="hidden" name="${f.k}" value="${esc(JSON.stringify(Array.isArray(val)?val:[]))}">
      <div class="imgs-grid" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px"></div>
      <label class="btn sm">${svg(IC.camera)} 사진 추가<input type="file" accept="image/*" multiple hidden data-imgsadd="${f.k}"></label></div>`;
    else if(f.t==='image')input=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <input type="hidden" name="${f.k}" value="${esc(val)}">
      <img data-imgprev="${f.k}" src="${esc(val)}" style="width:64px;height:64px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;${val?'':'display:none'}">
      <label class="btn sm">사진 선택<input type="file" accept="image/*" hidden data-imgpick="${f.k}"></label>
      <button type="button" class="btn sm ghost" data-imgclear="${f.k}" style="color:var(--bad);${val?'':'display:none'}">삭제</button></div>`;
    else input=`<input name="${f.k}" type="${f.t||'text'}" value="${esc(val)}" ${f.dl?`list="dl-${f.dl}"`:''} ${f.t==='number'?'step="any"':''}>`;
    return`<div class="field ${f.full?'full':''} ${f.money?'money':''}"><label>${f.l}${f.req?' <span class="req">*</span>':''}</label>${input}${f.hint&&f.t!=='textarea'?`<span class="hint">${f.hint}</span>`:''}</div>`;
  }).join('');
  overlayEl=document.createElement('div');overlayEl.className='overlay';
  overlayEl.innerHTML=`<div class="modal" role="dialog" aria-modal="true"><h2>${editing?'수정':'추가'} · ${cfg.title}</h2><div class="msub">${cfg.sub}</div>
    <form class="form" id="entForm">${fh}</form>
    <div class="modal-foot">${editing&&type!=='info'&&type!=='company'?`<button type="button" class="btn ghost" id="delBtn" style="color:var(--bad)">${svg(IC.trash)}삭제</button>`:type==='info'?`<button type="button" class="btn ghost" id="delProjBtn" style="color:var(--bad)">${svg(IC.trash)}프로젝트 삭제</button>`:'<span></span>'}
    <div class="right"><button type="button" class="btn" id="cancelBtn">취소</button><button type="submit" class="btn green" form="entForm">${editing?'저장':'추가'}</button></div></div></div>`;
  document.body.appendChild(overlayEl);
  const close=()=>{overlayEl.remove();overlayEl=null;};
  overlayEl.addEventListener('mousedown',e=>{if(e.target===overlayEl)close();});
  document.addEventListener('keydown',function k(e){if(e.key==='Escape'){close();document.removeEventListener('keydown',k);}});
  overlayEl.querySelector('#cancelBtn').onclick=close;
  /* 이미지 필드 처리 */
  overlayEl.querySelectorAll('[data-imgpick]').forEach(fi=>fi.onchange=async e=>{
    const k=fi.dataset.imgpick,f=e.target.files[0];if(!f)return;
    const du=await compressImage(f,f.type==='image/png'?900:640);
    if(!du){alert('이미지를 읽지 못했습니다.');return;}
    overlayEl.querySelector(`input[name="${k}"]`).value=du;
    const pv=overlayEl.querySelector(`[data-imgprev="${k}"]`);pv.src=du;pv.style.display='';
    overlayEl.querySelector(`[data-imgclear="${k}"]`).style.display='';
  });
  overlayEl.querySelectorAll('[data-imgclear]').forEach(b=>b.onclick=()=>{
    const k=b.dataset.imgclear;
    overlayEl.querySelector(`input[name="${k}"]`).value='';
    overlayEl.querySelector(`[data-imgprev="${k}"]`).style.display='none';
    b.style.display='none';
  });
  /* 다중 사진 필드 (현장일지 등) */
  overlayEl.querySelectorAll('[data-imgs]').forEach(wrap=>{
    const hid=wrap.querySelector('input[type=hidden]'),grid=wrap.querySelector('.imgs-grid');
    const get=()=>{try{return JSON.parse(hid.value||'[]');}catch(e){return[];}};
    const setv=a=>{hid.value=JSON.stringify(a);draw();};
    const draw=()=>{grid.innerHTML=get().map((du,i)=>`<div style="position:relative"><img src="${du}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;display:block;border:1px solid var(--line)">
      <button type="button" data-imgdel="${i}" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:none;background:var(--bad);color:#fff;font-size:12px;cursor:pointer;line-height:1">×</button></div>`).join('');
      grid.querySelectorAll('[data-imgdel]').forEach(b=>b.onclick=()=>{const a=get();a.splice(+b.dataset.imgdel,1);setv(a);});};
    draw();
    wrap.querySelector('[data-imgsadd]').onchange=async e=>{
      const fs=[...e.target.files];if(!fs.length)return;
      const a=get();
      for(const f of fs){const du=await compressImage(f);if(du)a.push(du);}
      setv(a);e.target.value='';
    };
  });
  const del=overlayEl.querySelector('#delBtn');
  if(del)del.onclick=()=>{if(confirm('삭제할까요?')){
    if(DB_FORM_TARGET[type])DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]].filter(x=>x.id!==existing.id);
    else{const p=proj();p[type]=p[type].filter(x=>x.id!==existing.id);}
    save();close();render();}};
  const delP=overlayEl.querySelector('#delProjBtn');
  if(delP)delP.onclick=()=>{
    if(DB.projects.length<=1){alert('마지막 남은 프로젝트는 삭제할 수 없습니다.');return;}
    const cur=proj();
    if(!confirm(`'${cur.info.name}' 프로젝트를 삭제할까요?\n일정·지출·사진 등 모든 데이터가 함께 삭제되며 되돌릴 수 없습니다.`))return;
    if(!confirm('정말 삭제합니다. 계속할까요?'))return;
    DB.projects=DB.projects.filter(x=>x.id!==cur.id);
    DB.active=DB.projects[0].id;
    save();close();render();toast('프로젝트가 삭제되었습니다');
  };
  overlayEl.querySelector('#entForm').onsubmit=e=>{e.preventDefault();
    const fd=new FormData(e.target),obj={};
    cfg.fields.forEach(f=>{let v=fd.get(f.k);if(f.t==='number')v=v===''?'':Number(v);if(f.t==='images'){try{v=JSON.parse(v||'[]');}catch(err){v=[];}}obj[f.k]=v;});
    for(const f of cfg.fields)if(f.req&&(obj[f.k]===''||obj[f.k]==null)){alert(`'${f.l}' 항목을 입력해 주세요.`);return;}
    cfg.fields.forEach(f=>{if(f.dl==='trades'&&obj[f.k])addTrade(obj[f.k]);});
    if(type==='info')Object.assign(proj().info,obj);
    else if(DB_FORM_TARGET[type]&&!editing){obj.id=uid();(DB[DB_FORM_TARGET[type]]=DB[DB_FORM_TARGET[type]]||[]).push(obj);}
    else if(editing)Object.assign(existing,obj);
    else{const p=proj();obj.id=uid();(p[type]=p[type]||[]).push(obj);}
    save();close();render();
  };
  if(!IS_TOUCH)setTimeout(()=>{const el=overlayEl?.querySelector('input,select,textarea');el&&el.focus();},30);
}

/* ===== new project ===== */
function newProject(){const id=uid();
  DB.projects.push({id,info:{name:'새 프로젝트',client:'',contact:'',address:'',area:'',siteInfo:'',manager:'',entryNo:'',amount:0,vat:'별도',start:'',end:'',status:'진행중',statusMemo:'',memo:''},todos:[],schedule:[],payments:[],materials:[],orders:[],logs:[],photos:[],expenses:[],as:[],files:[]});
  DB.active=id;state.tab='schedule';save();render();openForm('info',proj().info);}

/* ===== theme ===== */
function applyTheme(t){if(t)document.documentElement.setAttribute('data-theme',t);
  const dark=(document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='dark';
  document.getElementById('themeBtn').innerHTML=svg(dark?IC.sun:IC.moon);}
function initTheme(){let t=null;try{t=localStorage.getItem(KEY+'-theme');}catch(e){}applyTheme(t||'light');
  document.getElementById('themeBtn').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');const n=cur==='dark'?'light':'dark';try{localStorage.setItem(KEY+'-theme',n);}catch(e){}applyTheme(n);};}

/* ===== init ===== */
document.getElementById('newProjBtn').onclick=newProject;
/* PWA — 홈 화면 설치형 앱 (https에서만 동작, 로컬 파일은 무시) */
if('serviceWorker' in navigator&&location.protocol==='https:'){addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
initTheme();
(async function boot(){
  try{const s=JSON.parse(localStorage.getItem(SES_KEY)||'null');if(s&&s.refresh_token)session=s;}catch(e){}
  if(session){
    try{
      if(Date.now()>session.exp){await refreshSession();}
      else{clearTimeout(refT);refT=setTimeout(refreshSession,Math.max(30000,session.exp-Date.now()));}
    }catch(e){}
  }
  if(session){await enterApp();}
  else{showLogin();}
})();
</script>
